version: "3.7"

services:
  app_proxy:
    depends_on:
      web:
        condition: service_healthy
    environment:
      APP_HOST: denny-dokploy_web_1
      APP_PORT: 3000
      PROXY_AUTH_ADD: "false"

  web:
    image: dokploy/dokploy:v0.25.5@sha256:a3edbde94576e57939581ae197fffc1d53d05c50970d2504213942421fd47b8b
    restart: on-failure
    depends_on:
      postgres-password-migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      traefik:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://dokploy:${APP_SEED}@postgres:5432/dokploy
      REDIS_HOST: redis
      RELEASE_TAG: v0.25.5
      BETTER_AUTH_SECRET: ${APP_SEED}
      TRAEFIK_PORT: "8529"
      TRAEFIK_SSL_PORT: "8530"
      TZ: Europe/Berlin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${APP_DATA_DIR}/data/etc:/etc/dokploy
      - ${APP_DATA_DIR}/data/docker:/root/.docker
    networks:
      default:
      backend:
      dokploy-network:
        aliases:
          - dokploy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000').then(r =>
          process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  postgres:
    image: postgres:16.14-alpine3.23@sha256:42b8b8b29c8a4e933d88943e5b03001a78794905cf786e6e7634e9f2abd5a0d3
    restart: on-failure
    environment:
      POSTGRES_USER: dokploy
      POSTGRES_PASSWORD: ${APP_SEED}
      POSTGRES_DB: dokploy
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    networks:
      backend:
        aliases:
          - dokploy-postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U dokploy -d dokploy
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres-password-migration:
    image: postgres:16.14-alpine3.23@sha256:42b8b8b29c8a4e933d88943e5b03001a78794905cf786e6e7634e9f2abd5a0d3
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEW_POSTGRES_PASSWORD: ${APP_SEED}
      OLD_POSTGRES_PASSWORD: supersecurepass
    command:
      - /bin/sh
      - -c
      - |
        if PGPASSWORD="$${NEW_POSTGRES_PASSWORD}" psql -h postgres -U dokploy -d dokploy -c "SELECT 1" >/dev/null 2>&1; then
          echo "PostgreSQL already uses the current Umbrel app password."
          exit 0
        fi

        echo "Migrating the legacy Dokploy PostgreSQL password..."

        PGPASSWORD="$${OLD_POSTGRES_PASSWORD}" psql -h postgres -U dokploy -d dokploy --set=new_password="$${NEW_POSTGRES_PASSWORD}" -c "ALTER ROLE dokploy PASSWORD :'new_password';"
    networks:
      backend:

  redis:
    image: redis:7.4.7-alpine3.21@sha256:02f2cc4882f8bf87c79a220ac958f58c700bdec0dfb9b9ea61b62fb0e8f1bfcf
    restart: on-failure
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data
    networks:
      backend:
        aliases:
          - dokploy-redis
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  traefik:
    # Dokploy expects its Traefik container to use this fixed name.
    container_name: dokploy-traefik
    image: traefik:v3.5.4@sha256:4df0a50fcf71b454c0d7ad17675776dc8d37359deae3291895bdaa008c1b9972
    restart: on-failure
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "8529:80/tcp"
      - "8530:443/tcp"
      - "8530:443/udp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APP_DATA_DIR}/data/etc/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ${APP_DATA_DIR}/data/etc/traefik/dynamic:/etc/dokploy/traefik/dynamic
    networks:
      dokploy-network:
    healthcheck:
      test:
        - CMD
        - traefik
        - healthcheck
        - --ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  backend:
    internal: true
  dokploy-network:
    external: true
    name: dokploy-network
