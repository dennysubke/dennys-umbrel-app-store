version: "3.7"

services:
  app_proxy:
    depends_on:
      web:
        condition: service_started
    environment:
      APP_HOST: denny-dokploy_web_1
      APP_PORT: 3000
      PROXY_AUTH_ADD: "false"

  web:
    image: dokploy/dokploy:v0.29.12@sha256:a90e16e34eb3373c472e3303956155f4436202473efeaeb8aea6dfa703a87dbb
    restart: on-failure
    depends_on:
      postgres-password-migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      traefik:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://dokploy:amukds4wi9001583845717ad2@dokploy-postgres:5432/dokploy
      REDIS_HOST: dokploy-redis
      RELEASE_TAG: v0.29.12
      BETTER_AUTH_SECRET: ${APP_SEED}
      TRAEFIK_PORT: "8529"
      TRAEFIK_SSL_PORT: "8530"
      TZ: Europe/Berlin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${APP_DATA_DIR}/data/etc:/etc/dokploy
      - ${APP_DATA_DIR}/data/docker:/root/.docker
    networks:
      default:
      backend:
      dokploy-network:
        aliases:
          - dokploy
    healthcheck:
      disable: true

  postgres:
    # Dokploy expects its internal database to be named dokploy-postgres.
    container_name: dokploy-postgres
    image: postgres:16.14-alpine3.23@sha256:42b8b8b29c8a4e933d88943e5b03001a78794905cf786e6e7634e9f2abd5a0d3
    restart: on-failure
    environment:
      POSTGRES_USER: dokploy
      POSTGRES_PASSWORD: amukds4wi9001583845717ad2
      POSTGRES_DB: dokploy
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    networks:
      backend:
        aliases:
          - dokploy-postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U dokploy -d dokploy
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres-password-migration:
    image: postgres:16.14-alpine3.23@sha256:42b8b8b29c8a4e933d88943e5b03001a78794905cf786e6e7634e9f2abd5a0d3
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEFAULT_POSTGRES_PASSWORD: amukds4wi9001583845717ad2
      UMBREL_POSTGRES_PASSWORD: ${APP_SEED}
      LEGACY_POSTGRES_PASSWORD: supersecurepass
    command:
      - /bin/sh
      - -c
      - |
        set -eu

        if PGPASSWORD="$${DEFAULT_POSTGRES_PASSWORD}" \
          psql -h dokploy-postgres -U dokploy -d dokploy \
          -c "SELECT 1" >/dev/null 2>&1; then
          echo "PostgreSQL already uses the password expected by Dokploy."
          exit 0
        fi

        if PGPASSWORD="$${UMBREL_POSTGRES_PASSWORD}" \
          psql -h dokploy-postgres -U dokploy -d dokploy \
          -c "SELECT 1" >/dev/null 2>&1; then
          CURRENT_POSTGRES_PASSWORD="$${UMBREL_POSTGRES_PASSWORD}"
          echo "Migrating PostgreSQL password from the previous Umbrel app password..."
        elif PGPASSWORD="$${LEGACY_POSTGRES_PASSWORD}" \
          psql -h dokploy-postgres -U dokploy -d dokploy \
          -c "SELECT 1" >/dev/null 2>&1; then
          CURRENT_POSTGRES_PASSWORD="$${LEGACY_POSTGRES_PASSWORD}"
          echo "Migrating PostgreSQL password from the legacy package password..."
        else
          echo "Unable to authenticate to the existing Dokploy database." >&2
          exit 1
        fi

        PGPASSWORD="$${CURRENT_POSTGRES_PASSWORD}" \
          psql \
            -h dokploy-postgres \
            -U dokploy \
            -d dokploy \
            --set=new_password="$${DEFAULT_POSTGRES_PASSWORD}" \
            -c "ALTER ROLE dokploy PASSWORD :'new_password';"

        PGPASSWORD="$${DEFAULT_POSTGRES_PASSWORD}" \
          psql -h dokploy-postgres -U dokploy -d dokploy \
          -c "SELECT 1" >/dev/null

        echo "PostgreSQL password migration completed."
    networks:
      backend:

  redis-permissions:
    image: redis:7.4.7-alpine3.21@sha256:02f2cc4882f8bf87c79a220ac958f58c700bdec0dfb9b9ea61b62fb0e8f1bfcf
    user: "0:0"
    command:
      - /bin/sh
      - -c
      - |
        chown -R 1000:1000 /data
        chmod -R u+rwX,g+rwX /data
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data

  redis:
    # Dokploy expects its internal cache to be named dokploy-redis.
    container_name: dokploy-redis
    image: redis:7.4.7-alpine3.21@sha256:02f2cc4882f8bf87c79a220ac958f58c700bdec0dfb9b9ea61b62fb0e8f1bfcf
    user: "1000:1000"
    restart: on-failure
    depends_on:
      redis-permissions:
        condition: service_completed_successfully
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data
    networks:
      backend:
        aliases:
          - dokploy-redis
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  traefik:
    # Dokploy expects its Traefik container to use this fixed name.
    container_name: dokploy-traefik
    image: traefik:v3.5.4@sha256:4df0a50fcf71b454c0d7ad17675776dc8d37359deae3291895bdaa008c1b9972
    restart: on-failure
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "8529:80/tcp"
      - "8530:443/tcp"
      - "8530:443/udp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APP_DATA_DIR}/data/etc/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ${APP_DATA_DIR}/data/etc/traefik/dynamic:/etc/dokploy/traefik/dynamic
    networks:
      dokploy-network:
    healthcheck:
      test:
        - CMD
        - traefik
        - healthcheck
        - --ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  backend:
    internal: true

  dokploy-network:
    external: true
    name: dokploy-network
