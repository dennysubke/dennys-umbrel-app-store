description: >-
  🌈 HyperHDR is an advanced ambient lighting system that analyzes video and audio sources in real time and transforms their colors into dynamic lighting effects around a television, monitor, or entertainment setup.


  The application captures visual content from compatible video grabbers, software capture clients, network streams, and supported external sources. It processes the incoming image, detects the dominant colors across configurable screen regions, and sends synchronized color information to connected LED strips and smart lights.


  HyperHDR supports a wide range of LED controllers and lighting systems, including WLED, Philips Hue, Home Assistant lights, Zigbee2MQTT devices, Adalight-compatible controllers, and various network-based LED drivers. Multiple lighting instances can be configured independently for different screens, rooms, or LED layouts.


  The integrated web interface provides tools for arranging LEDs around the screen, adjusting brightness, gamma, color balance, smoothing, refresh rates, and image processing settings. Users can preview captured video, test individual LEDs, create custom effects, manage priorities, and switch between different input sources.


  HyperHDR includes automatic HDR tone mapping, LUT-based color calibration, HDR10 and P010 video support, image cropping, black-bar detection, and configurable color correction. These features help produce accurate and responsive ambient lighting across both SDR and HDR content.


  Built-in APIs and network protocols allow external applications, media players, capture clients, and home automation systems to control lighting states, stream image data, trigger effects, and integrate HyperHDR into broader entertainment or smart home workflows.
