releaseNotes: >-
  HyperHDR 21 introduces automatic HDR tone mapping, P010 HDR10 video support, MP4-based LUT calibration, Home Assistant light integration, and experimental Zigbee2MQTT support.


  This release also improves resource efficiency, expands supported capture formats, adds ZSTD-compressed LUT files, and includes numerous fixes and performance improvements.
