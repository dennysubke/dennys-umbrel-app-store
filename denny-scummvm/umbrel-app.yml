releaseNotes: >-
  This version expands ScummVM’s supported game library with several new titles, including two Nancy Drew adventures, Noctropolis, Cartoon Carnival, Alfred Pelrock, and multiple Pilot Brothers games.


  It also improves the interface with kinetic scrolling and clearer visual feedback for clickable links. Additional fixes address window sizing when leaving fullscreen mode in 3D engines, while a lightweight NULL OPL driver has been added for lower-end systems.
