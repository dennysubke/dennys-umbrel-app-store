  - https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-koel/4.jpg
releaseNotes: >-
  This version adds faster AAC transcoding through FFmpeg and introduces nested playlist folders for improved organization. It also prevents smaller images from being unnecessarily upscaled.
