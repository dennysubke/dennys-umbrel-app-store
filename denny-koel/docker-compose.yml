version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: denny-koel_web_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  web:
    image: phanan/koel
    restart: on-failure
    depends_on:
      - database
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: database
      DB_PORT: 5432
      DB_USERNAME: koel
      DB_PASSWORD: koelpassword
      DB_DATABASE: koel
    volumes:
      - ${APP_DATA_DIR}/music:/music
      - ${APP_DATA_DIR}/data/images:/var/www/html/storage/app/public/images
      - ${APP_DATA_DIR}/data/search-indexes:/var/www/html/storage/search-indexes

  database:
    image: postgres:13
    restart: on-failure
    environment:
      POSTGRES_DB: koel
      POSTGRES_USER: koel
      POSTGRES_PASSWORD: koelpassword
    volumes:
      - ${APP_DATA_DIR}/data/database:/var/lib/postgresql/data
