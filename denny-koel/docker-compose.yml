version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: denny-koel_web_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  web:
    image: phanan/koel:9.11.0
    restart: on-failure
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_SEED: ${APP_SEED}

      APP_ENV: production
      APP_DEBUG: "false"
      OPTIMIZE_CONFIG: "true"

      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: koel
      DB_USERNAME: koel
      DB_PASSWORD: ${APP_SEED}

      MEDIA_PATH: /music
      STREAMING_METHOD: x-sendfile

    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p \
          /music \
          /var/www/html/storage/app/public/images \
          /var/www/html/storage/search-indexes

        touch /var/www/html/.env
        chown www-data:www-data /var/www/html/.env
        chmod 600 /var/www/html/.env

        chown www-data:www-data /music

        chown -R www-data:www-data \
          /var/www/html/storage/app/public/images \
          /var/www/html/storage/search-indexes

        export APP_KEY="$$(php -r 'echo "base64:" . base64_encode(hash("sha256", getenv("APP_SEED"), true));')"

        exec /usr/local/bin/koel-entrypoint apache2-foreground
    volumes:
      - ${APP_DATA_DIR}/data/music:/music:rw
      - ${APP_DATA_DIR}/data/images:/var/www/html/storage/app/public/images:rw
      - ${APP_DATA_DIR}/data/search-indexes:/var/www/html/storage/search-indexes:rw

  database:
    image: mariadb:11.8.8
    restart: on-failure
    environment:
      MARIADB_ROOT_PASSWORD: ${APP_SEED}
      MARIADB_DATABASE: koel
      MARIADB_USER: koel
      MARIADB_PASSWORD: ${APP_SEED}
    volumes:
      - ${APP_DATA_DIR}/data/database:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mariadb-admin ping --host=127.0.0.1 --user=root --password="$${MARIADB_ROOT_PASSWORD}" --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
