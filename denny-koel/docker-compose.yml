version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: denny-koel_web_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  web:
    image: phanan/koel:9.11.0
    restart: on-failure
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: database
      DB_PORT: 5432
      DB_USERNAME: koel
      DB_PASSWORD: ${APP_SEED}
      DB_DATABASE: koel
      APP_KEY: base64:Ni5+ZF4mJrGc6BQ1ErQ1s9QmpF0j/3e5LzhGkyz9fOE=
    entrypoint:
      - /bin/sh
      - -c
      - |
        touch /var/www/html/.env
        exec /usr/local/bin/koel-entrypoint apache2-foreground
    volumes:
      - ${APP_DATA_DIR}/music:/music
      - ${APP_DATA_DIR}/data/images:/var/www/html/storage/app/public/images
      - ${APP_DATA_DIR}/data/search-indexes:/var/www/html/storage/search-indexes

  database:
    image: postgres:13
    restart: on-failure
    environment:
      POSTGRES_DB: koel
      POSTGRES_USER: koel
      POSTGRES_PASSWORD: ${APP_SEED}
    volumes:
      - ${APP_DATA_DIR}/data/database:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U koel -d koel
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
