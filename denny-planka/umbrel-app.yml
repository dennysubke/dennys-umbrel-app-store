releaseNotes: >-
   This update adds a new Pro features discovery banner and improves administration by allowing admins to change user avatars.


   It also includes several fixes, including better S3 compatibility, reduced memory usage in the Squid proxy, support for specifying a proxy target, and corrected handling of Unicode and emoji characters in avatar initials.


   Additionally, the German translation was updated and many dependencies were bumped across the client and server to improve security, stability, and maintainability.
