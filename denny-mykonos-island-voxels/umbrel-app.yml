description: >-
  Mykonos Island Voxels is a relaxing browser-based island builder that lets you create a small Mediterranean world on an isometric grid. Arrange whitewashed houses, blue-domed chapels, windmills, trees, gardens, paths, bridges, water and decorative objects to design your own sunlit Greek island.

  More than 75 detailed assets are divided into terrain, nature, props, water and building categories. Objects can be placed individually or painted across several tiles, while zooming, panning, flipping, grid controls and erase tools make it easy to reshape the island from desktop or mobile devices.

  There are no resources to collect, scores to chase or objectives to complete. Your current island is saved automatically in the browser and restored when you return, allowing you to focus entirely on experimenting, decorating and building at your own pace.
