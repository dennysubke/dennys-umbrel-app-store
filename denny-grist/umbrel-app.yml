releaseNotes: >-
  This update improves overall stability and setup experience. Large Airtable imports no longer time out, ACL condition editors now display correctly in Firefox, and the Quick Setup flow now includes a telemetry toggle and authentication recommendations.


  Forms can now use {{ID}} in redirect URLs to send users directly to a page related to their submitted record. The Admin Panel also adds new boot checks for persistent data storage and outgoing request security.


  Building grist-core from source now creates the Full Edition by default, while the previous Community Edition behavior can still be selected manually.


  The Full Edition also gains OAuth Dynamic Client Registration, more precise webhook permissions, AI Assistant improvements, MCP enhancements, and small updates to Automations and Audit Logs.
