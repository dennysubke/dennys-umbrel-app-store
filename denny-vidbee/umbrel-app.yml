name: VidBee
tagline: A modern, open-source video downloader
icon: https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-vidbee/logo.png
category: media
version: "1.3.14"
port: 3779
description: >-
  🐝 VidBee is a versatile media downloader that lets you save videos and audio from more than 1,000 supported websites, including popular video platforms and social networks. Simply add a media link, choose the preferred output format, and follow the download progress through a clear and intuitive interface.


  Downloads can be organized in a queue and individually paused, resumed, or restarted whenever needed. VidBee provides real-time progress information, making it easy to monitor multiple downloads and keep track of active tasks. Users can select between several output containers, including MP4, MKV, and WebM, or allow the application to choose a suitable format automatically.


  VidBee also supports automatic downloads through RSS subscriptions. Feeds from favorite channels and creators can be added once, allowing newly published videos to be detected and downloaded automatically. This makes it easy to maintain a continuously updated personal collection of videos and audio without manually adding every new release.
