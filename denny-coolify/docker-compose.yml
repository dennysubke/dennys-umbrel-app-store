version: "3.7"

services:
  app_proxy:
    depends_on:
      web:
        condition: service_healthy
    environment:
      APP_HOST: denny-coolify_web_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  # A dedicated Docker daemon for workloads deployed by Coolify. Coolify never
  # receives Umbrel's host Docker socket.
  docker:
    image: docker:28.0.4-dind@sha256:ddb0033088b4fab74881ade341a582e3c6c8021b82377703ba1a6106bd3ded44
    privileged: true
    init: true
    restart: on-failure
    stop_grace_period: 1m
    environment:
      DOCKER_TLS_CERTDIR: ""
    command:
      - --host=unix:///data/docker.sock
      - --data-root=/data/engine
      - --exec-root=/data/exec
      - --pidfile=/data/docker.pid
      - --storage-driver=overlay2
    ports:
      # Entry points for applications deployed inside Coolify.
      - "8531:80/tcp"
      - "8532:443/tcp"
      - "8532:443/udp"
    volumes:
      - ${APP_DATA_DIR}/data/docker:/data
      - ${APP_DATA_DIR}/data/coolify:/data/coolify
    healthcheck:
      test: ["CMD-SHELL", "docker -H unix:///data/docker.sock info >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  # Coolify's supported Docker Desktop mode controls its local server through
  # SSH. This bridge exposes only the isolated Docker daemon above.
  coolify-testing-host:
    # Upstream currently publishes this helper only as `latest`; the immutable
    # multiarch manifest digest prevents it from moving underneath this package.
    image: ghcr.io/coollabsio/coolify-testing-host:latest@sha256:88d0826eb8ae8cecb0c49eaaa9e321a7bf81931a48c8492366607eb211371d81
    init: true
    restart: on-failure
    depends_on:
      docker:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while [ ! -S /docker-socket/docker.sock ]; do sleep 1; done
        ln -sf /docker-socket/docker.sock /var/run/docker.sock
        exec /usr/sbin/sshd -D -o ListenAddress=0.0.0.0 -o Port=22
    volumes:
      - ${APP_DATA_DIR}/data/docker:/docker-socket
      - ${APP_DATA_DIR}/data/coolify:/data/coolify
    networks:
      default:
        aliases:
          # Coolify 4.1.2 may seed the local server with this hostname.
          - host.docker.internal
    healthcheck:
      test: ["CMD-SHELL", "docker info >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  postgres:
    image: postgres:15@sha256:c189d272e4fcdd1ac419adee675d30be3d389c22ee770d593f15819d22a68a0d
    restart: on-failure
    environment:
      POSTGRES_USER: coolify
      POSTGRES_PASSWORD: ${APP_COOLIFY_DB_PASSWORD}
      POSTGRES_DB: coolify
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  redis:
    image: redis:7.4.7-alpine3.21@sha256:02f2cc4882f8bf87c79a220ac958f58c700bdec0dfb9b9ea61b62fb0e8f1bfcf
    restart: on-failure
    environment:
      REDIS_PASSWORD: ${APP_COOLIFY_REDIS_PASSWORD}
    command:
      - redis-server
      - --save
      - "20"
      - "1"
      - --loglevel
      - warning
      - --requirepass
      - ${APP_COOLIFY_REDIS_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5s

  soketi:
    image: ghcr.io/coollabsio/coolify-realtime:1.0.16@sha256:b5bb9d1c95d9b4ca59773b82d1e1a2bf4ccac5fbed33be19b9b3906574db3629
    restart: on-failure
    environment:
      APP_NAME: Coolify
      SOKETI_DEBUG: "false"
      SOKETI_DEFAULT_APP_ID: ${APP_COOLIFY_PUSHER_ID}
      SOKETI_DEFAULT_APP_KEY: ${APP_COOLIFY_PUSHER_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${APP_COOLIFY_PUSHER_SECRET}
      SOKETI_HOST: 0.0.0.0
    ports:
      - "6001:6001/tcp"
      - "6002:6002/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/coolify/ssh:/var/www/html/storage/app/ssh
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6001/ready >/dev/null && wget -qO- http://127.0.0.1:6002/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  web:
    image: ghcr.io/coollabsio/coolify:4.1.2@sha256:3a27ba5f7f98ff7763a0a4d6715ec36e564f9622eea8f492c46f90716ea2525f
    init: true
    restart: on-failure
    working_dir: /var/www/html
    env_file:
      - ${APP_DATA_DIR}/coolify.env
    environment:
      APP_ENV: production
      PHP_MEMORY_LIMIT: 512M
      PHP_FPM_PM_CONTROL: dynamic
      PHP_FPM_PM_START_SERVERS: 1
      PHP_FPM_PM_MIN_SPARE_SERVERS: 1
      PHP_FPM_PM_MAX_SPARE_SERVERS: 10
    volumes:
      - ${APP_DATA_DIR}/coolify.env:/var/www/html/.env:ro
      - ${APP_DATA_DIR}/data/coolify:/data/coolify
      - ${APP_DATA_DIR}/data/coolify/ssh:/var/www/html/storage/app/ssh
      - ${APP_DATA_DIR}/data/coolify/applications:/var/www/html/storage/app/applications
      - ${APP_DATA_DIR}/data/coolify/databases:/var/www/html/storage/app/databases
      - ${APP_DATA_DIR}/data/coolify/services:/var/www/html/storage/app/services
      - ${APP_DATA_DIR}/data/coolify/backups:/var/www/html/storage/app/backups
      - ${APP_DATA_DIR}/data/coolify/webhooks-during-maintenance:/var/www/html/storage/app/webhooks-during-maintenance
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      soketi:
        condition: service_healthy
      coolify-testing-host:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
