version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: denny-zennotes_web_1
      APP_PORT: 7878
      PROXY_AUTH_ADD: "false"

  permissions:
    image: busybox:1.37.0
    user: "0:0"
    restart: "no"
    command:
      - sh
      - -c
      - |
        mkdir -p /workspace /data
        chown -R 1000:1000 /workspace /data
        chmod -R u+rwX /workspace /data
    volumes:
      - ${APP_DATA_DIR}/vault:/workspace
      - ${APP_DATA_DIR}/data:/data

  web:
    image: adibhanna/zennotes:2.13.1
    user: "1000:1000"
    restart: on-failure

    depends_on:
      permissions:
        condition: service_completed_successfully

    read_only: true

    tmpfs:
      - /tmp

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    environment:
      ZENNOTES_BIND: "0.0.0.0:7878"
      ZENNOTES_CONFIG_PATH: "/data/server.json"
      ZENNOTES_DEFAULT_VAULT_PATH: "/workspace"
      ZENNOTES_BROWSE_ROOTS: "/workspace"
      ZENNOTES_AUTH_TOKEN: "${APP_PASSWORD}"
      ZENNOTES_ALLOW_INSECURE_NOAUTH: "0"
      ZENNOTES_PERSIST_SESSIONS: "1"

    volumes:
      - ${APP_DATA_DIR}/vault:/workspace
      - ${APP_DATA_DIR}/data:/data
