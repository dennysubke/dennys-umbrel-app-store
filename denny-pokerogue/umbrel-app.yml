description: >-
  👾 PokéRogue is a browser-based monster-catching roguelite that combines turn-based battles with randomized runs, long-term progression, and strategic team building. Players choose their starters, encounter wild creatures, challenge trainers and bosses, and travel through changing biomes while collecting items and improving their team.


  Each run offers different encounters, rewards, abilities, and tactical decisions. Players can catch additional creatures, unlock new starters, hatch eggs, discover rare variants, and experiment with different team combinations. Multiple game modes and persistent unlocks provide strong replay value while preserving the familiar rhythm of classic turn-based creature battles.


  Dynamic difficulty and unexpected encounters encourage players to adapt their strategies throughout every run. A broad selection of creatures, moves, items, and passive abilities allows for countless tactical combinations, while every attempt offers new opportunities to improve and progress.


  ⚠️ Please note that the initial installation may take up to 10 minutes, depending on your device and internet connection.
  
  
  ℹ️ For keyboard controls and additional gameplay information, please refer to the README: 
      
  https://github.com/dennysubke/dennys-umbrel-app-store/blob/master/denny-pokerogue/README.md
