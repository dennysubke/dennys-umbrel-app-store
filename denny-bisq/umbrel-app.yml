description: >-
  🛡️ Bisq is a decentralized peer-to-peer exchange that lets you buy and sell Bitcoin directly with other people without handing custody of your funds to a centralized exchange.


  🌐 The full Bisq desktop interface runs continuously on your Umbrel and is available through your browser. Offers, trade communication, Tor connectivity, the integrated wallet, payment accounts, and dispute handling remain accessible even when your computer is turned off.


  🔐 Wallet data, payment account information, trade history, and settings are stored locally on your Umbrel. The browser interface is protected by Umbrel authentication, and no VNC port is exposed directly.


  ⚠️ Bisq contains a hot wallet. Only store the amount required for active trades and security deposits, and back up your wallet seed and Bisq data before funding it.


  💻 This app is available only for amd64/x86-64 systems and is not compatible with Raspberry Pi or other ARM64 devices. Bisq is resource-intensive because it runs Java, a full desktop environment, Tor, wallet services, and large network datasets. At least 8 GB of RAM and 4 CPU cores are recommended, especially for the initial startup and DAO data import.


  📖 For detailed installation guidance, system requirements, and further information, please refer to the README: 
  
  
  https://github.com/dennysubke/dennys-umbrel-app-store/blob/master/denny-bisq/README.md
