releaseNotes: >-
  Bisq 1.10.4 is an important security update that fixes several vulnerabilities identified during a recent security audit. Updating is required to continue trading, and BSQ Swaps have also been re-enabled.


  The release improves signature verification for DAO blocks, blind votes, dispute cases, and arbitrator witness data, while also strengthening the filtering of trusted network sources. Offers with a price of zero are now rejected, trusted seed nodes are preferred during startup, and BTC fees are routed correctly to the Burning Man distribution addresses.


  In addition, alert authors can now remove all alerts they created, and legacy arbitrator data has been removed from trade and deposit workflows.
