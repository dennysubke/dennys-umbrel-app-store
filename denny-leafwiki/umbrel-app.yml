releaseNotes: >-
  This update improves LeafWiki’s reliability around backups and filesystem syncing, including async resync with progress polling, live resync signals, better Git backup handling, and Unix socket support.


  It also fixes several editor and UI issues, including possible data loss on resize, editor 404 flashes, deep links after login, external image previews, syntax highlighting, and smoother dialogs.


  Overall, LeafWiki is now more stable, safer to edit in, and better suited for automated or server based workflows.
