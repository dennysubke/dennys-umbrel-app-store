releaseNotes: >-
  Appwrite 1.9.5 is a major maintenance and reliability release with many new public APIs for project settings, proxy management, authentication, SMTP, OAuth providers, services, platforms, and organization projects.


  Database and migration support has been expanded with JSON import/export references, BigInt support, broader migration coverage, and several stability fixes for DocumentsDB, TablesDB, and VectorsDB.


  Authentication and user management received new email and password policy options, X OAuth 2.0 support, impersonation improvements, better MFA handling, and multiple fixes for sessions, teams, memberships, and OAuth providers.


  Realtime, messaging, storage, functions, and sites were improved with the new Presences API, better WebSocket reliability, Amazon SES support, more stable SMTP delivery, improved chunked uploads, longer build timeouts, new Bun/Deno runtimes, and better build caching.


  Self-hosted installations also received important installer and Docker Compose fixes, including improved compose generation, corrected service wiring, host validation fixes, and updated base images with security patches.
