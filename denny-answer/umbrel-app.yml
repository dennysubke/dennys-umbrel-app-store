releaseNotes: >-
  This release includes several new features and many improvements:

    - AI Workflow integration: introduced a comprehensive AI ecosystem, including a built-in AI Assistant, MCP server support, and API Key management.
    - Advanced search capabilities: implemented semantic search and vector search plugins, enabling high-efficiency embeddings for questions and answers.
    - Extensibility & customization: added support for editor plugins and introduced a revamped administrative navigation experience with flexible layout options.
    - Enhanced security: strengthened the authorization framework through the implementation of API key scope checks and refined moderator visibility controls.


  Full release notes can be found at https://github.com/apache/answer/releases/tag/v2.0.1
