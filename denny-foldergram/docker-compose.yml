version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: denny-foldergram_web_1
      APP_PORT: 4141
      PROXY_AUTH_ADD: "false"

  web:
    image: ghcr.io/foldergram/foldergram:latest
    restart: on-failure
    environment:
      IMAGE_DETAIL_SOURCE: preview
      DERIVATIVE_MODE: eager
    volumes:
      - ${UMBREL_ROOT}/data/storage/Photos:/app/data/gallery
      - ${APP_DATA_DIR}/data/db:/app/data/db
      - ${APP_DATA_DIR}/data/thumbnails:/app/data/thumbnails
      - ${APP_DATA_DIR}/data/previews:/app/data/previews