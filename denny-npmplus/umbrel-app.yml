id: denny-npmplus
name: NPMplus
tagline: A secure reverse proxy with advanced traffic control
icon: https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-npmplus/logo.png
category: networking
version: "2026.7.23"
port: 8530
description: >-
  NPMplus is an enhanced reverse proxy manager with a modern web interface for publishing self-hosted services securely. It provides proxy hosts, automatic SSL certificates, access lists, redirects, TCP and UDP streams, custom NGINX configuration, and detailed traffic controls in one place.


  The application extends the familiar Nginx Proxy Manager workflow with additional security, privacy, performance, and usability features. It supports HTTP/3, modern TLS settings, integrated certificate management, local authentication, and persistent SQLite storage while keeping administration accessible from the Umbrel dashboard.


  For installation notes, router configuration, initial login details, and important security information, please read the README: https://github.com/dennysubke/dennys-umbrel-app-store/blob/master/denny-npmplus/README.md
