description: >-
  🟢 Bisq 2 Node runs a private and continuously available Bisq 2 backend directly on your Umbrel. The application connects to the decentralized Bisq network through its integrated Tor service and allows secure access using the Bisq Connect mobile app.


  The included web interface shows the current node status and provides a pairing QR code for connecting your smartphone. After pairing, you can browse offers, communicate with other traders, manage trades, and use Bisq Easy from your mobile device. Since the node runs continuously on your Umbrel, it remains connected to the Bisq network even when the mobile app is closed.


  Your trading data and communication remain stored locally on your Umbrel instead of being controlled by a centralized exchange. Bisq does not take custody of your funds and enables users to trade directly with one another. The decentralized architecture removes the need for accounts with a central operator and helps preserve your privacy. Bisq 2 Node is ideal for users who want convenient mobile access while keeping their trading infrastructure private, decentralized, and self-hosted at home.
